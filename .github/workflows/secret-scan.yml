name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          version=8.24.2
          archive="gitleaks_${version}_linux_x64.tar.gz"
          curl -sSfL \
            -o "${archive}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"
          echo "fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e  ${archive}" \
            | sha256sum -c -
          tar -xzf "${archive}"
          chmod +x gitleaks

      - name: Scan repository for secrets
        run: |
          ./gitleaks detect \
            --config .gitleaks.toml \
            --redact \
            --verbose
